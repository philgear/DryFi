name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["Conserver", "main"]
    paths:
      - "front-end/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front-end
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production --base-href /DryFi/front-end/

      - name: Prepare Artifact Directory
        run: |
          mkdir -p ../artifact_root/front-end
          cp -R dist/front-end/browser/* ../artifact_root/front-end/
          echo '<!DOCTYPE html><html lang="en"><head><meta http-equiv="refresh" content="0; url=front-end/" /><title>Redirecting...</title></head><body><p>Redirecting to <a href="front-end/">front-end/</a>...</p></body></html>' > ../artifact_root/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifact_root

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
